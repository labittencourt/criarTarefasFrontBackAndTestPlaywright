name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  e2e-tests:
    name: Testes E2E e API (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Construir imagens
        run: docker compose build

      - name: Subir backend e frontend
        run: docker compose up -d backend frontend

      - name: Executar testes Playwright (E2E + API)
        run: docker compose run --rm tests

      - name: Publicar relatório HTML como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

      - name: Publicar relatório JUnit como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: tests/junit.xml
          retention-days: 7

      - name: Encerrar ambiente
        if: always()
        run: docker compose down -v

  publish-report:
    name: Publicar relatório no GitHub Pages
    needs: e2e-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - name: Baixar relatório HTML
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
