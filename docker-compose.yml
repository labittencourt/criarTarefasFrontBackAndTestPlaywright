version: "3.8"

services:

  # ── Backend ──────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: qa-backend
    ports:
      - "3001:3001"
    volumes:
      - sqlite-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: qa-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── Testes E2E ────────────────────────────────────────────
  tests:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    container_name: qa-tests
    working_dir: /tests
    environment:
      - BASE_URL=http://frontend
      - API_URL=http://frontend/api/todos
    volumes:
      - ./tests:/tests
      - ./tests/playwright-report:/tests/playwright-report
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    command: >
      sh -c "npm install && npx playwright install --with-deps && npm test"
    profiles:
      - test

volumes:
  sqlite-data: